
services:
  mongodb:
    image: 'mongo:latest'
    container_name: thrift-mongodb
    environment:
      - MONGO_INITDB_ROOT_DATABASE=${MONGO_DATABASE}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
    ports:
      - '27017'
    env_file:
      - .env

    volumes:
      - mongodb-data:/data/db

volumes:
  mongodb-data: